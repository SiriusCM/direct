name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # 👈 先只保 main 分支，别搞 feat-* 了，容易错
  workflow_dispatch:

# 👇 关键修复：必须给 pages 写入权限，否则 100% 报错
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # 👇 这里假设你的 vite.config.js 里 base 写死了 '/direct/'
        # 如果没写死，请确保这里能读到环境变量，或者直接改 vite.config.js
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4